name: Update public robotics data

on:
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync from Google Sheets
        run: npm run sync
        env:
          SHEET_CSV_URL: ${{ vars.SHEET_CSV_URL }}

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update public robotics database"
          file_pattern: data/*.csv data/*.json
